<script>

/////////////////////////////////////////////////////
// MAP INIT
/////////////////////////////////////////////////////

const map = L.map('map').setView([26.42, 50.09], 11);

const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution: '&copy; OpenStreetMap contributors' }
).addTo(map);

/////////////////////////////////////////////////////
// GLOBAL STORAGE
/////////////////////////////////////////////////////

let districtLayers = {};
let districtCounts = {};
let countMarkers = [];

/////////////////////////////////////////////////////
// DISTRICT COLORS
/////////////////////////////////////////////////////

const colors = {
  "Dammam": "blue",
  "Al Khobar": "red",
  "Dhahran": "green"
};

const municipalityCodes = {
  "Dammam": "10501",
  "Al Khobar": "10506",
  "Dhahran": "10513"
};

const grouped = {
  "Dammam": [],
  "Al Khobar": [],
  "Dhahran": []
};

const boundaryLayer = L.layerGroup();

/////////////////////////////////////////////////////
// LOAD DISTRICTS
/////////////////////////////////////////////////////

fetch("districts.geojson")
.then(r => r.json())
.then(data => {

  data.features.forEach(feature => {

    const city = feature.properties.City;
    const name = feature.properties.Name;

    if (!grouped[city]) return;

    const layer = L.geoJSON(feature, {
      style: {
        color: "black",
        weight: 1,
        fillColor: colors[city] || "gray",
        fillOpacity: 0.3
      }
    }).bindTooltip(`${name}`);

    // 🔥 store for counting
    districtLayers[name] = layer;

    grouped[city].push({
      label: name,
      layer: layer
    });

    boundaryLayer.addLayer(
      L.geoJSON(feature, {
        style: { color: "black", weight: 1, fillOpacity: 0 }
      })
    );

  });

  const overlaysTree = {
    label: 'Districts by Municipality',
    children: [
      {
        label: `Dammam (${municipalityCodes["Dammam"]})`,
        selectAllCheckbox: true,
        children: grouped["Dammam"]
      },
      {
        label: `Al Khobar (${municipalityCodes["Al Khobar"]})`,
        selectAllCheckbox: true,
        children: grouped["Al Khobar"]
      },
      {
        label: `Dhahran (${municipalityCodes["Dhahran"]})`,
        selectAllCheckbox: true,
        children: grouped["Dhahran"]
      },
      {
        label: "District Boundary",
        layer: boundaryLayer
      }
    ]
  };

  L.control.layers.tree(
    { "OpenStreetMap": osm },
    overlaysTree,
    { collapsed: false }
  ).addTo(map);

});

/////////////////////////////////////////////////////
// CLEAR OLD LABELS
/////////////////////////////////////////////////////

function clearCounts(){
  countMarkers.forEach(m => map.removeLayer(m));
  countMarkers = [];
}

/////////////////////////////////////////////////////
// CALCULATE DISTRICT COUNTS
/////////////////////////////////////////////////////

function renderDistrictCounts(rows){

  clearCounts();
  districtCounts = {};

  // 🔥 count per district
  rows.forEach(r => {
    if(!r.state) return;

    if(!districtCounts[r.state]){
      districtCounts[r.state] = 0;
    }

    districtCounts[r.state] += 1;
  });

  // 🔥 place count label
  Object.keys(districtCounts).forEach(name => {

    const layer = districtLayers[name];
    if(!layer) return;

    const center = layer.getBounds().getCenter();

    const marker = L.marker(center, {
      icon: L.divIcon({
        className: "district-count",
        html: `<div style="
          background:white;
          border-radius:50%;
          padding:8px;
          font-weight:bold;
          border:2px solid black;
          text-align:center;
        ">
          ${districtCounts[name]}
        </div>`,
        iconSize: [40, 40]
      })
    });

    marker.addTo(map);
    countMarkers.push(marker);

  });

}

/////////////////////////////////////////////////////
// RECEIVE DATA FROM GRAFANA
/////////////////////////////////////////////////////

window.addEventListener("message", (event) => {

  console.log("📩 Received:", event.data);

  if (
    event.data?.type === "incidentData" &&
    Array.isArray(event.data.data)
  ) {
    renderDistrictCounts(event.data.data);
  }

});

/////////////////////////////////////////////////////
// READY SIGNAL
/////////////////////////////////////////////////////

window.parent.postMessage({ type: "iframeReady" }, "*");

</script>
