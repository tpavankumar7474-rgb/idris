<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>District Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- ✅ CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body { margin:0; padding:0; height:100%; }
#map { width:100%; height:100vh; }
</style>

</head>

<body>

<div id="map"></div>

<!-- ✅ JS (USE DEFER - VERY IMPORTANT) -->
<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ✅ YOUR SCRIPT (AFTER LEAFLET) -->
<script defer>

document.addEventListener("DOMContentLoaded", function(){

  console.log("✅ Script started");

  // ✅ CHECK LEAFLET
  if (typeof L === "undefined") {
    alert("Leaflet not loaded!");
    return;
  }

  // ----------------------------
  // MAP INIT
  // ----------------------------
  const map = L.map('map').setView([26.42, 50.09], 11);

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: '&copy; OpenStreetMap contributors' }
  ).addTo(map);

  // ----------------------------
  // TEST MARKER (DEBUG)
  // ----------------------------
  L.marker([26.42, 50.09])
    .addTo(map)
    .bindTooltip("Map Loaded ✅")
    .openTooltip();

  // ----------------------------
  // LOAD GEOJSON (OPTIONAL TEST)
  // ----------------------------
  fetch("./districts.geojson")
    .then(res => {
      if (!res.ok) throw new Error("GeoJSON not found");
      return res.json();
    })
    .then(data => {
      console.log("✅ GeoJSON loaded");

      L.geoJSON(data).addTo(map);

    })
    .catch(err => {
      console.error("❌ GeoJSON error:", err);
    });

});
</script>

</body>
</html>
