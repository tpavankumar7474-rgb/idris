<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>District Map + Grafana</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- ✅ CSS FIRST -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.control.layers.tree@1.1.0/L.Control.Layers.Tree.css"/>

<style>
html, body { margin:0; padding:0; height:100%; }
#map { width:100%; height:100vh; }

.leaflet-control-layers {
  max-height:80vh;
  overflow:auto;
  font-size:14px;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- ✅ JS LIBRARIES (ORDER VERY IMPORTANT) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.control.layers.tree@1.1.0/L.Control.Layers.Tree.js"></script>

<script>

/////////////////////////////////////////////////////
// SAFE LOAD (fix L undefined issue)
/////////////////////////////////////////////////////

window.onload = function(){

console.log("✅ Map script started");

/////////////////////////////////////////////////////
// MAP INIT
/////////////////////////////////////////////////////

const map = L.map('map').setView([26.42, 50.09], 11);

const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution: '&copy; OpenStreetMap contributors' }
).addTo(map);

/////////////////////////////////////////////////////
// DISTRICT COUNT LAYER (NO CLUSTER)
/////////////////////////////////////////////////////

const districtCountLayer = L.layerGroup().addTo(map);

/////////////////////////////////////////////////////
// TOOLTIP
/////////////////////////////////////////////////////

function buildTooltip(r){
  return `
    <b>Ticket:</b> ${r.ticket ?? "N/A"}<br>
    <b>Location:</b> ${r.state ?? "N/A"}<br>
    <b>Classification:</b> ${r.classification ?? "N/A"}<br>
    <b>Status:</b> ${r.status ?? "N/A"}
  `;
}

/////////////////////////////////////////////////////
// GROUP DATA BY DISTRICT
/////////////////////////////////////////////////////

function renderDistrictCounts(rows){

  districtCountLayer.clearLayers();

  const groupedData = {};

  rows.forEach(r => {
    if(!r.state) return;

    if(!groupedData[r.state]){
      groupedData[r.state] = {
        count: 0,
        lat: r.lat,
        long: r.long
      };
    }

    groupedData[r.state].count += 1;
  });

  Object.keys(groupedData).forEach(name => {

    const d = groupedData[name];

    const marker = L.marker([d.lat, d.long], {
      icon: L.divIcon({
        html: `<div style="
          background:red;
          color:white;
          border-radius:50%;
          width:35px;
          height:35px;
          display:flex;
          align-items:center;
          justify-content:center;
          font-weight:bold;
        ">${d.count}</div>`,
        className: ""
      })
    });

    marker.bindTooltip(`<b>${name}</b><br>Total: ${d.count}`);

    marker.on("click", () => {
      window.parent.postMessage({
        type: "mapClick",
        state: name,
        lat: d.lat,
        long: d.long
      }, "*");
    });

    districtCountLayer.addLayer(marker);
  });
}

/////////////////////////////////////////////////////
// DISTRICT TREE
/////////////////////////////////////////////////////

const colors = {
  "Dammam": "blue",
  "Al Khobar": "red",
  "Dhahran": "green"
};

const municipalityCodes = {
  "Dammam": "10501",
  "Al Khobar": "10506",
  "Dhahran": "10513"
};

const grouped = {
  "Dammam": [],
  "Al Khobar": [],
  "Dhahran": []
};

const boundaryLayer = L.layerGroup();

/////////////////////////////////////////////////////
// LOAD GEOJSON (FIXED PATH)
/////////////////////////////////////////////////////

fetch("./districts.geojson")
.then(res => {
  if(!res.ok) throw new Error("GeoJSON not found");
  return res.json();
})
.then(data => {

  console.log("✅ GeoJSON Loaded");

  data.features.forEach(feature => {

    const city = feature.properties.City;
    const name = feature.properties.Name;

    if (!grouped[city]) return;

    const layer = L.geoJSON(feature, {
      style: {
        color: "black",
        weight: 1,
        fillColor: colors[city] || "gray",
        fillOpacity: 0.5
      }
    }).bindTooltip(`${name} (${city})`);

    grouped[city].push({
      label: name,
      layer: layer
    });

    boundaryLayer.addLayer(
      L.geoJSON(feature, {
        style: { color: "black", weight: 1, fillOpacity: 0 }
      })
    );
  });

  const overlaysTree = {
    label: 'Districts',
    children: [
      {
        label: `Dammam (${municipalityCodes["Dammam"]})`,
        selectAllCheckbox: true,
        children: grouped["Dammam"]
      },
      {
        label: `Al Khobar (${municipalityCodes["Al Khobar"]})`,
        selectAllCheckbox: true,
        children: grouped["Al Khobar"]
      },
      {
        label: `Dhahran (${municipalityCodes["Dhahran"]})`,
        selectAllCheckbox: true,
        children: grouped["Dhahran"]
      },
      {
        label: "Boundary",
        layer: boundaryLayer
      },
      {
        label: "District Counts",
        layer: districtCountLayer
      }
    ]
  };

  L.control.layers.tree(
    { "OpenStreetMap": osm },
    overlaysTree,
    { collapsed: false }
  ).addTo(map);

})
.catch(err => console.error("❌ GeoJSON Error:", err));

/////////////////////////////////////////////////////
// RECEIVE GRAFANA DATA
/////////////////////////////////////////////////////

window.addEventListener("message", (event) => {

  if (
    event.data?.type === "incidentData" &&
    Array.isArray(event.data.data)
  ) {
    console.log("📩 Data received:", event.data.data.length);
    renderDistrictCounts(event.data.data);
  }

});

/////////////////////////////////////////////////////
// READY SIGNAL
/////////////////////////////////////////////////////

window.parent.postMessage({ type: "iframeReady" }, "*");

}; // END window.onload

</script>

</body>
</html>
